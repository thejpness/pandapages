services:
  traefik:
    image: traefik:v3.7.7@sha256:1cb3845d7a05e1473c9086351426597e911db49db382b6e4769f9b0744962ac8
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --log.level=INFO
      - --accesslog=true
      - --accesslog.format=json
      - --accesslog.filters.statuscodes=400-599
      - --accesslog.fields.defaultmode=drop
      - --accesslog.fields.names.StartUTC=keep
      - --accesslog.fields.names.Duration=keep
      - --accesslog.fields.names.RouterName=keep
      - --accesslog.fields.names.ServiceName=keep
      - --accesslog.fields.names.ServiceURL=keep
      - --accesslog.fields.names.RequestMethod=keep
      - --accesslog.fields.names.RequestPath=keep
      - --accesslog.fields.names.OriginDuration=keep
      - --accesslog.fields.names.OriginStatus=keep
      - --accesslog.fields.names.DownstreamStatus=keep
      - --accesslog.fields.names.RetryAttempts=keep
      - --accesslog.fields.headers.defaultmode=drop
      - --accesslog.fields.queryparameters.defaultmode=drop
      - --accesslog.fields.names.ClientUsername=drop
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080" # Traefik dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [web]

  postgres:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_DB: pandapages
      POSTGRES_USER: pandapages
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets: [pg_password]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandapages_app -d pandapages"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [internal]
    labels:
      - traefik.enable=false
      - com.pandapages.test-seed-target=local-development

  migrate:
    build:
      context: ./apps/api
      target: migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/migrations:/migrations:ro
    networks: [internal]
    restart: "no"
    labels:
      - traefik.enable=false
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: ${MIGRATION_DATABASE_URL:?MIGRATION_DATABASE_URL must use the dedicated migration role}
      GOOSE_MIGRATION_DIR: /migrations
    command: ["up"]

  api:
    build:
      context: ./apps/api
      target: dev
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:?APP_DATABASE_URL must use the dedicated application role}
      PGAPPNAME: pandapages-api
      PP_ASSET_DIR: /data/assets
      PP_PASSCODE: ${PP_PASSCODE}
      PP_SESSION_SECRET: ${PP_SESSION_SECRET}
      PP_ADMIN_KEY: ${PP_ADMIN_KEY}
      PP_LOG_LEVEL: ${PP_LOG_LEVEL:-debug}
    volumes:
      - ./apps/api:/app
      - assets:/data/assets
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # The Alpine dev image includes BusyBox wget. Air's initial compile took
    # roughly seven to nine seconds in observed local starts, so the grace period
    # leaves ample headroom without declaring the container healthy before Go
    # serves /healthz.
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "2", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 2s
      start_period: 20s
      retries: 5
    networks: [web, internal]
    labels:
      - traefik.enable=true
      # Critical: force Traefik to use the web network IP (avoids random 504s when service is on multiple networks)
      - traefik.docker.network=pandapages_web
      - traefik.http.routers.api-admin.rule=Host(`pandapages.localhost`) && PathPrefix(`/api/v1/admin/`)
      - traefik.http.routers.api-admin.priority=200
      - traefik.http.routers.api-admin.service=api
      - traefik.http.routers.api-admin.middlewares=pandapages-dev-admin-key@docker
      - traefik.http.middlewares.pandapages-dev-admin-key.headers.customrequestheaders.X-PP-Admin-Key=${PP_ADMIN_KEY}
      - traefik.http.routers.api.rule=Host(`pandapages.localhost`) && (PathPrefix(`/api`) || PathPrefix(`/assets`) || Path(`/healthz`) || Path(`/readyz`))
      - traefik.http.routers.api.priority=100
      - traefik.http.services.api.loadbalancer.server.port=8080
    ports:
      - "127.0.0.1:8081:8080" # debug: direct access to API (bypass Traefik). Remove once stable.

  web:
    build:
      context: ./apps/web
      target: dev
    environment:
      VITE_API_BASE: http://pandapages.localhost
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on: [api]
    networks: [web]
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`pandapages.localhost`) && !PathPrefix(`/api`) && !PathPrefix(`/assets`) && !Path(`/healthz`) && !Path(`/readyz`)
      - traefik.http.services.web.loadbalancer.server.port=5173

networks:
  web:
    name: pandapages_web
  internal:
    name: pandapages_internal

volumes:
  pgdata: {}
  assets: {}
  web_node_modules: {}


secrets:
  pg_password:
    file: ./secrets/pg_password.txt
